stream {
    upstream http_backend {
        server 127.0.0.1:8080; # Local HTTP proxy
    }

    upstream https_backend {
        server 8.8.8.8:443; # Example using Google DNS for simplicity
    }

    server {
        listen 6443;
        proxy_timeout 30s;
        proxy_pass $upstream;
        error_log /var/log/nginx/stream_proxy_error.log;
        access_log /var/log/nginx/stream_proxy_access.log;

        # Protocol detection
        # Map the first byte to an upstream
        map $ssl_preread_protocol $upstream {
            default https_backend;
            "HTTP/1.1" http_backend;
            "HTTP/1.0" http_backend;
        }

        ssl_preread on;
    }
}

