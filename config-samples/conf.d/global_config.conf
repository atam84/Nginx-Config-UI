server {
   listen 192.168.9.120:80;
   server_name next.testing-config.com www.testing-config.com;

   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

   access_log /var/log/nginx/cri_access.log;
   error_log /var/log/nginx/cri_error.log;

   ignore_invalid_headers off;
   client_max_body_size 0;
   proxy_buffering off;
   proxy_request_buffering off;

   proxy_set_header Host $http_host;
   proxy_set_header X-Real-IP $remote_addr;
   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header X-Forwarded-Proto $scheme;

   proxy_connect_timeout 300;
   
   proxy_read_timeout 120s;

   proxy_http_version 1.1;
   proxy_set_header Connection "";

   location / {
      if ($query_string ~ "page=") {
         rewrite ^ /esign?$args last;
      }
      proxy_pass http://nodes_frontend;
   }

   location ~ ^/(backend/api|crui-invest)/ {
      proxy_pass http://nodes_backend;
   }

   location /foncier {
      proxy_pass http://m-nodes_frontend;
   }

   location /foncier/api {
      proxy_pass http://m-nodes_backend;
   }

   location ~* ^/(assets|themes)/ {
      proxy_pass http://node-signature.internal.network.lab;
      proxy_set_header Host node-signature.internal.network.lab;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      expires 30d;
      access_log off;
      log_not_found off;
   }

   location /Setup.exe {
      rewrite ^/esign(.*)$ /$1 break;
      proxy_pass http://node-signature.internal.network.lab;
      proxy_set_header Host node-signature.internal.network.lab;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
   }

   location /esign {
      rewrite ^/esign(.*)$ /$1 break;
      proxy_pass http://node-signature.internal.network.lab;
      proxy_set_header Host node-signature.internal.network.lab;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff|ttf|svg)$ {
	 proxy_pass http://node-signature.internal.network.lab;
         expires 30d;
         access_log off;
      }
   }

   location = /validate-connection {
     return 200 'OK NEXT from $server_name\n';
     add_header Content-Type text/plain;
   }
}


server {
   listen 192.168.9.150:80;
   server_name gestion.testing-config.com;

   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

   access_log /var/log/nginx/gestion_access.log;
   error_log /var/log/nginx/gestion_error.log;

   ignore_invalid_headers off;
   client_max_body_size 0;
   proxy_buffering off;
   proxy_request_buffering off;

   proxy_set_header Host $http_host;
   proxy_set_header X-Real-IP $remote_addr;
   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header X-Forwarded-Proto $scheme;

   proxy_connect_timeout 300;
   proxy_http_version 1.1;
   proxy_set_header Connection "";


   location / {
      proxy_pass http://nodes_frontend;
   }
   
   location ~ ^/(backend/api|crui-invest)/ {
      proxy_pass http://nodes_backend;
   }

   location /foncier/api {
      proxy_pass http://m-nodes_backend;
   }

   location = /validate-connection {
     return 200 'OK from $server_name\n';
     add_header Content-Type text/plain;
   }

   location /incidents {
     return 301 /incidents/;  # Redirect to the version with the slash
   }

   location /incidents/ {
    proxy_pass http://mantisbt.internal.network.lab:8099/; 
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 512M;
   }
  
   location ~* ^/(assets|themes)/ {
      proxy_pass http://node-signature.internal.network.lab;
      proxy_set_header Host node-signature.internal.network.lab;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      expires 30d;
      access_log off;
      log_not_found off;
   }

}


