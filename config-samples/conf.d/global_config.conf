upstream nodes_frontend {
   #ip_hash;
   least_conn;
   server node-01.internal.network.lab:80;
   server node-02.internal.network.lab:80;
   server node-03.internal.network.lab:80;
}

upstream nodes_backend {
   ip_hash;
   #least_conn;
   server node-01.internal.network.lab:8080;
   server node-02.internal.network.lab:8080;
   server node-03.internal.network.lab:8080;
}

upstream m-nodes_frontend {
   #ip_hash;
   least_conn;
   server m-node-01.internal.network.lab:80;
   server m-node-02.internal.network.lab:80;
}

upstream m-nodes_backend {
   ip_hash;
   #least_conn;
   server m-node-01.internal.network.lab:8080;
   server m-node-02.internal.network.lab:8080;
}




server {
   listen 192.168.9.170:80;
   server_name api-prod.testing-config.com;

   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

   ignore_invalid_headers off;
   client_max_body_size 0;
   proxy_buffering off;
   proxy_request_buffering off;

   proxy_set_header Host $http_host;
   proxy_set_header X-Real-IP $remote_addr;
   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header X-Forwarded-Proto $scheme;

   proxy_connect_timeout 300;
   proxy_http_version 1.1;
   proxy_set_header Connection "";


   location ~ ^/(|validate-connection)$ {
     return 200 'OK from $server_name\n';
     add_header Content-Type text/plain;
   }

   location ~ ^/(backend/api|crui-invest)/ {
      proxy_pass http://nodes_backend;
   }

}

