## Airflow
server {
   listen 192.168.9.80:80;
   server_name p-airflow.internal.network.lab;

   location / {
      #proxy_set_header Host $host;
      #proxy_set_header X-Real-IP $remote_addr;
      #proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      #proxy_set_header X-Forwarded-Proto $scheme;
      #proxy_set_header X-Original-URI $request_uri;
      #proxy_set_header X-CSRFToken $http_x_csrf_token;
      #proxy_set_header X-CSRF-Token $http_x_csrf_token;
      #proxy_set_header Cookie $http_cookie;

      #proxy_redirect off;

      #proxy_buffering on;
      #proxy_buffers 32 4k;
      #proxy_busy_buffers_size 64k;
      #proxy_max_temp_file_size 128k;

      #proxy_connect_timeout 60s;
      #proxy_send_timeout 60s;
      #proxy_read_timeout 60s;
      #send_timeout 60s;

      proxy_pass http://airflow_cluster;

      #proxy_set_header X-Forwarded-Host $host;

      #proxy_cookie_path / "/; secure; HttpOnly; SameSite=lax";
    }

   gzip on;
   gzip_min_length 256;
   gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
   gzip_proxied any;
   gzip_vary on;
}

## geoserver
server {
   listen 192.168.9.80:80;
   server_name p-geoserver.internal.network.lab;

   location /geoserver/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Server $host;

      # Ensure that cookies are correctly passed
      proxy_cookie_path / "/; HttpOnly; Secure; SameSite=lax";

      # Pass headers for authentication
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-CSRFToken $http_x_csrf_token;
      proxy_set_header X-CSRF-Token $http_x_csrf_token;

      proxy_pass http://geoserver_cluster;
   }
}


## minio
server {
   listen 192.168.9.80:9000;
   server_name p-minio-api.internal.network.lab;

   ignore_invalid_headers off;
   client_max_body_size 0;
   proxy_buffering off;
   proxy_request_buffering off;

   proxy_set_header Host $http_host;
   proxy_set_header X-Real-IP $remote_addr;
   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header X-Forwarded-Proto $scheme;

   proxy_connect_timeout 300;
   proxy_http_version 1.1;
   proxy_set_header Connection "";

   location / {
      proxy_pass http://minio_s3;
   }
}

## minio
server {
   listen 192.168.9.80:80;
   server_name p-minio.internal.network.lab;

   ignore_invalid_headers off;
   client_max_body_size 0;
   proxy_buffering off;
   proxy_request_buffering off;

   proxy_set_header Host $http_host;
   proxy_set_header X-Real-IP $remote_addr;
   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header X-Forwarded-Proto $scheme;
   proxy_set_header X-NginX-Proxy true;

   real_ip_header X-Real-IP;

   proxy_connect_timeout 300;

   proxy_http_version 1.1;
   proxy_set_header Upgrade $http_upgrade;
   proxy_set_header Connection "upgrade";

   location / {
      proxy_pass http://minio_console;
   }
}

