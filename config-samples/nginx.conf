user www-data;
worker_processes auto;
worker_cpu_affinity auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
        worker_connections 768;
        # multi_accept on;
}

# Other HTTP related configuration
stream {
    log_format stream_logs '$remote_addr [$time_local] '
                           '$protocol $status $bytes_sent $bytes_received '                                                                                                                                       
                           '$session_time';                                                                                                                                                                       

    access_log /var/log/nginx/openvpn_stream_access.log stream_logs;

    server {
        listen 192.168.9.120:9443;
        proxy_pass 192.168.9.100:9443;
        proxy_buffer_size 16k;
    }
}

http {
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;  # Recursively search for the real IP
        # Add each WAF IP address that you want to trust
        set_real_ip_from 10.171.222.177;
        set_real_ip_from 10.171.222.173;
        set_real_ip_from 10.171.222.174;
        set_real_ip_from 10.171.222.172; 
        # Testing with WAF subnet, it's a good idea to use the subnet
        #set_real_ip_from 10.171.222.0/24;
        server_tokens off;

        log_format custom '$remote_addr - $realip_remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';

        # Define the rate limit zone
        limit_req_zone $binary_remote_addr zone=one:10m rate=5r/s; # Adjust rate as needed

        ##
        # Basic Settings
        ##

        sendfile on;
        tcp_nopush on;
        types_hash_max_size 2048;
        # server_tokens off;

        # server_names_hash_bucket_size 64;
        # server_name_in_redirect off;

        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        ##
        # SSL Settings
        ##

        ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
        ssl_prefer_server_ciphers on;

        ##
        # Logging Settings
        ##

        access_log /var/log/nginx/access.log;

        ##
        # Gzip Settings
        ##

        gzip on;

        # gzip_vary on;
        # gzip_proxied any;
        # gzip_comp_level 6;
        # gzip_buffers 16 8k;
        # gzip_http_version 1.1;
        # gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        ##
        # Virtual Host Configs
        ##

        include /etc/nginx/conf.d/*.conf;
        include /etc/nginx/sites-enabled/*;
}


